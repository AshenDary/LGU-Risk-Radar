name: Apply DB Migrations

on:
  workflow_dispatch: {}

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply SQL migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          set -e
          files=(lgu-risk-scanner/supabase/migrations/*.sql)
          if [ ! -e "${files[0]}" ]; then
            echo "No migration files found in lgu-risk-scanner/supabase/migrations"
            exit 1
          fi

          for f in "${files[@]}"; do
            echo "Applying $f"
            psql "$DATABASE_URL" -f "$f"
          done
